<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>NL Group — Заказ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #111);
      padding: 12px;
    }
    .shop-bar {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .shop-bar label { font-size: 14px; opacity: 0.6; white-space: nowrap; }
    .shop-bar select {
      flex: 1; font-size: 14px; background: transparent;
      border: none; color: var(--tg-theme-text-color, #111); outline: none;
    }
    .section-label {
      font-size: 12px; opacity: 0.5; letter-spacing: 0.06em;
      text-transform: uppercase; margin: 0 4px 8px;
    }
    .items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .item-card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .item-card.active { background: #dceeff; }
    .item-emoji { font-size: 24px; width: 34px; text-align: center; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 500; }
    .item-price { font-size: 12px; opacity: 0.55; margin-top: 2px; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .qty-btn {
      width: 30px; height: 30px; border-radius: 50%; border: none;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.85; transition: opacity 0.1s, transform 0.1s;
    }
    .qty-btn:active { opacity: 1; transform: scale(0.92); }
    .qty-num { font-size: 15px; font-weight: 500; min-width: 22px; text-align: center; }
    .summary {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px; padding: 14px; margin-bottom: 14px;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 13px; opacity: 0.7; margin-bottom: 6px;
    }
    .summary-total {
      display: flex; justify-content: space-between;
      font-size: 15px; font-weight: 500;
      padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.08); margin-top: 4px;
    }
    .empty-hint { text-align: center; font-size: 13px; opacity: 0.45; padding: 8px 0 14px; }
    .order-btn-fallback {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 15px; font-weight: 500; cursor: pointer;
    }
    .order-btn-fallback:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-box {
      background: #fff0f0; border-radius: 10px; padding: 16px;
      font-size: 13px; color: #c0392b; text-align: center; margin-top: 20px;
    }
    .success { display: none; text-align: center; padding: 48px 16px; }
    .success-icon { font-size: 56px; margin-bottom: 14px; }
    .success-text { font-size: 17px; font-weight: 500; }
    .success-sub { font-size: 13px; opacity: 0.55; margin-top: 6px; }
  </style>
</head>
<body>

<div id="main" style="display:none">
  <div class="shop-bar">
    <label>Точка:</label>
    <select id="shop-select"></select>
  </div>
  <p class="section-label">Меню</p>
  <div class="items" id="items-list"></div>
  <div class="summary" id="summary" style="display:none">
    <div id="summary-lines"></div>
    <div class="summary-total">
      <span>Итого</span>
      <span id="total-val"></span>
    </div>
  </div>
  <p class="empty-hint" id="empty-hint">Выберите товары для заказа</p>
  <button class="order-btn-fallback" id="order-btn-fallback" disabled style="display:none">Заказать</button>
</div>

<div id="error-box" style="display:none" class="error-box"></div>

<div class="success" id="success">
  <div class="success-icon">✅</div>
  <p class="success-text">Заказ отправлен!</p>
  <p class="success-sub" id="success-sub"></p>
</div>

<script>
// ─── Эмодзи для товаров ───────────────────────────────────────────────────────
const EMOJI = {
  "Гирос": "🥙", "Гриль": "🍖", "Классика": "🥪", "Хот-дог": "🌭",
  "Френч": "🥖", "Донер в багете": "🥗", "Донер в лаваше": "🫓", "Пицца": "🍕",
};
const emoji = name => EMOJI[name] || "🍽";

// ─── Состояние ───────────────────────────────────────────────────────────────
let SHOPS = [], ALL_PRICES = {}, MENU = [], qty = {}, currentShop = "";

// ─── Telegram WebApp ─────────────────────────────────────────────────────────
const tg   = window.Telegram?.WebApp || null;
const isTg = !!tg;
if (isTg) {
  tg.ready();
  tg.expand();
  tg.MainButton.setText("Заказать");
  tg.MainButton.hide();
  tg.MainButton.onClick(sendOrder);
} else {
  const fb = document.getElementById("order-btn-fallback");
  fb.style.display = "block";
  fb.addEventListener("click", sendOrder);
}

// ─── Читаем цены из URL ───────────────────────────────────────────────────────
// Бот передаёт прайс как base64-encoded JSON в параметре ?prices=...
function loadPricesFromUrl() {
  const params  = new URLSearchParams(window.location.search);
  const encoded = params.get("prices");

  if (!encoded) {
    showError("Меню не загружено.\nОткройте WebApp через команду /order в боте.");
    return;
  }

  try {
    // base64url → JSON
    const bytes = Uint8Array.from(
  atob(encoded.replace(/-/g, '+').replace(/_/g, '/')),
  c => c.charCodeAt(0)
);
    const json = new TextDecoder().decode(bytes);
    const data = JSON.parse(json);

    SHOPS      = data.shops || [];
    ALL_PRICES = data.menu  || {};   // {товар: {точка: цена}}

    if (!SHOPS.length) throw new Error("Список точек пустой");

    // Заполняем select точек
    const sel = document.getElementById("shop-select");
    sel.innerHTML = "";
    SHOPS.forEach(shop => {
      const opt = document.createElement("option");
      opt.value = shop;
      opt.textContent = shop;
      sel.appendChild(opt);
    });

    currentShop = SHOPS[0];
    buildMenuForShop(currentShop);
    document.getElementById("main").style.display = "block";

  } catch (e) {
    showError("Ошибка при чтении меню: " + e.message);
  }
}

function showError(msg) {
  const el = document.getElementById("error-box");
  el.textContent = msg;
  el.style.display = "block";
}

// ─── Меню для выбранной точки ─────────────────────────────────────────────────
function buildMenuForShop(shop) {
  MENU = Object.entries(ALL_PRICES)
    .map(([name, prices]) => ({ name, price: prices[shop] || 0 }))
    .filter(item => item.price > 0);   // товары без цены для этой точки скрыты

  qty = {};
  MENU.forEach(item => qty[item.name] = 0);
  render();
}

document.getElementById("shop-select").addEventListener("change", e => {
  currentShop = e.target.value;
  buildMenuForShop(currentShop);
});

// ─── Рендер ──────────────────────────────────────────────────────────────────
function render() {
  const list = document.getElementById("items-list");
  list.innerHTML = "";

  MENU.forEach(item => {
    const q = qty[item.name] || 0;
    const card = document.createElement("div");
    card.className = "item-card" + (q > 0 ? " active" : "");
    card.innerHTML = `
      <span class="item-emoji">${emoji(item.name)}</span>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">${item.price.toLocaleString()} тг</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-name="${item.name}" data-delta="-1">−</button>
        <span class="qty-num">${q}</span>
        <button class="qty-btn" data-name="${item.name}" data-delta="1">+</button>
      </div>`;
    list.appendChild(card);
  });

  const ordered  = MENU.filter(i => (qty[i.name] || 0) > 0);
  const total    = ordered.reduce((s, i) => s + qty[i.name] * i.price, 0);
  const hasItems = ordered.length > 0;

  document.getElementById("summary").style.display    = hasItems ? "block" : "none";
  document.getElementById("empty-hint").style.display = hasItems ? "none"  : "block";

  if (hasItems) {
    document.getElementById("summary-lines").innerHTML =
      ordered.map(i =>
        `<div class="summary-row">
           <span>${i.name} × ${qty[i.name]}</span>
           <span>${(qty[i.name] * i.price).toLocaleString()} тг</span>
         </div>`
      ).join("");
    document.getElementById("total-val").textContent = total.toLocaleString() + " тг";
  }

  if (isTg) {
    hasItems ? tg.MainButton.show() : tg.MainButton.hide();
  } else {
    document.getElementById("order-btn-fallback").disabled = !hasItems;
  }
}

// ─── Клик +/- ────────────────────────────────────────────────────────────────
document.getElementById("items-list").addEventListener("click", e => {
  const btn = e.target.closest("[data-delta]");
  if (!btn) return;
  const name = btn.dataset.name;
  qty[name]  = Math.max(0, (qty[name] || 0) + +btn.dataset.delta);
  render();
});

// ─── Отправка заказа ─────────────────────────────────────────────────────────
function sendOrder() {
  const shop    = document.getElementById("shop-select").value;
  const ordered = MENU.filter(i => (qty[i.name] || 0) > 0);
  const total   = ordered.reduce((s, i) => s + qty[i.name] * i.price, 0);

  const payload = {
    shop,
    items: ordered.map(i => ({
      name:  i.name,
      qty:   qty[i.name],
      price: i.price,
      total: qty[i.name] * i.price,
    })),
    total,
  };

  if (isTg) {
    tg.MainButton.showProgress();
    tg.sendData(JSON.stringify(payload));
  } else {
    console.log("Payload:", JSON.stringify(payload, null, 2));
    document.getElementById("main").style.display    = "none";
    document.getElementById("success").style.display = "block";
    document.getElementById("success-sub").textContent =
      `${shop} · ${ordered.length} поз. · ${total.toLocaleString()} тг`;
  }
}

// ─── Старт ───────────────────────────────────────────────────────────────────
loadPricesFromUrl();
</script>
</body>
</html>
