<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>NL Group — Заказ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #111);
      padding: 12px;
    }

    .shop-bar {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .shop-bar label { font-size: 14px; opacity: 0.6; white-space: nowrap; }
    .shop-bar select {
      flex: 1;
      font-size: 14px;
      background: transparent;
      border: none;
      color: var(--tg-theme-text-color, #111);
      outline: none;
    }

    .section-label {
      font-size: 12px;
      opacity: 0.5;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0 4px 8px;
    }

    .items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

    .item-card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
    }
    .item-card.active { background: var(--tg-theme-secondary-bg-color, #e8f4ff); }
    .item-emoji { font-size: 26px; width: 36px; text-align: center; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 500; }
    .item-price { font-size: 12px; opacity: 0.55; margin-top: 2px; }

    .qty-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .qty-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: none;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      opacity: 0.85;
      transition: opacity 0.1s, transform 0.1s;
    }
    .qty-btn:active { opacity: 1; transform: scale(0.92); }
    .qty-num { font-size: 15px; font-weight: 500; min-width: 22px; text-align: center; }

    .summary {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 6px;
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 500;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.08);
      margin-top: 4px;
    }

    .empty-hint {
      text-align: center;
      font-size: 13px;
      opacity: 0.45;
      padding: 8px 0 14px;
    }

    /* Главная кнопка использует MainButton Telegram — CSS не нужен */
    /* Но на случай fallback для браузера: */
    .order-btn-fallback {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    .order-btn-fallback:disabled { opacity: 0.4; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 48px 16px;
    }
    .success-icon { font-size: 56px; margin-bottom: 14px; }
    .success-text { font-size: 17px; font-weight: 500; }
    .success-sub { font-size: 13px; opacity: 0.55; margin-top: 6px; }
  </style>
</head>
<body>

<div id="main">
  <div class="shop-bar">
    <label>Точка:</label>
    <select id="shop-select">
      <option value="Найман">Найман</option>
      <option value="Жасмин">Жасмин</option>
      <option value="Арша">Арша</option>
      <option value="Провиант">Провиант</option>
    </select>
    <button id="refresh-btn" class="qty-btn" style="width: 36px; height: 36px; font-size: 16px;">↻</button>
  </div>

  <p class="section-label">Меню</p>
  <div class="items" id="items-list"></div>

  <div class="summary" id="summary" style="display:none">
    <div id="summary-lines"></div>
    <div class="summary-total">
      <span>Итого</span>
      <span id="total-val"></span>
    </div>
  </div>
  <p class="empty-hint" id="empty-hint">Выберите товары для заказа</p>

  <!-- Fallback-кнопка для тестирования в браузере -->
  <button class="order-btn-fallback" id="order-btn-fallback" disabled style="display:none">
    Заказать
  </button>
</div>

<div class="success" id="success">
  <div class="success-icon">✅</div>
  <p class="success-text">Заказ отправлен!</p>
  <p class="success-sub" id="success-sub"></p>
</div>

<script>
// ─── Данные меню ──────────────────────────────────────────
const API_BASE = window.location.origin;
const MENU_API_URL = `${API_BASE}/menu-data`;

const EMOJI_MAP = {
  "Гирос": "🥙",
  "Гриль": "🍖",
  "Классика": "🥪",
  "Хот-дог": "🌭",
  "Френч": "🥖",
  "Донер в багете": "🥗",
  "Донер в лаваше": "🫓",
  "Пицца": "🍕",
};

let MENU = [];
const qty = {};

function getItemPrice(item) {
  const shop = document.getElementById("shop-select").value;
  const price = item.prices?.[shop];
  return typeof price === "number" ? price : Number(price) || 0;
}

async function loadMenu() {
  const emptyHint = document.getElementById("empty-hint");
  const refreshBtn = document.getElementById("refresh-btn");
  emptyHint.textContent = "Загрузка прайса...";
  refreshBtn.disabled = true;
  refreshBtn.textContent = "⏳";

  try {
    const response = await fetch(MENU_API_URL);
    if (!response.ok) {
      throw new Error(`Ошибка загрузки прайса: ${response.status}`);
    }
    const data = await response.json();
    if (!Array.isArray(data.items) || !Array.isArray(data.shops)) {
      throw new Error("Неверный формат прайс-данных");
    }

    MENU = data.items.map((item, index) => ({
      id: index + 1,
      name: item.name,
      prices: item.prices || {},
      emoji: item.emoji || EMOJI_MAP[item.name] || "🍽",
    }));

    MENU.forEach(item => qty[item.id] = 0);

    const shopSelect = document.getElementById("shop-select");
    shopSelect.innerHTML = data.shops
      .map(shop => `<option value="${shop}">${shop}</option>`)
      .join("");

    render();
  } catch (error) {
    console.error(error);
    document.getElementById("main").innerHTML = `
      <p class="empty-hint">${error.message}</p>
      <p class="empty-hint">Проверьте, запущен ли бот и доступен ли API /menu-data.</p>
      <button onclick="location.reload()" class="order-btn-fallback">Перезагрузить</button>`;
  } finally {
    refreshBtn.disabled = false;
    refreshBtn.textContent = "↻";
  }
}

// ─── Telegram WebApp init ─────────────────────────────────
const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
const isTg = !!tg;

if (isTg) {
  tg.ready();
  tg.expand();
  // Главная кнопка Telegram
  tg.MainButton.setText("Заказать");
  tg.MainButton.hide();
  tg.MainButton.onClick(sendOrder);
} else {
  // Fallback для тестирования в браузере
  const fb = document.getElementById("order-btn-fallback");
  fb.style.display = "block";
  fb.addEventListener("click", sendOrder);
}

document.getElementById("shop-select").addEventListener("change", render);

document.getElementById("refresh-btn").addEventListener("click", () => {
  loadMenu();
});

document.getElementById("items-list").addEventListener("click", e => {
  const btn = e.target.closest("[data-delta]");
  if (!btn) return;
  const id = +btn.dataset.id;
  qty[id] = Math.max(0, (qty[id] || 0) + +btn.dataset.delta);
  render();
});

function render() {
  const list = document.getElementById("items-list");
  list.innerHTML = "";

  MENU.forEach(item => {
    const q = qty[item.id] || 0;
    const price = getItemPrice(item);
    const card = document.createElement("div");
    card.className = "item-card" + (q > 0 ? " active" : "");
    card.innerHTML = `
      <span class="item-emoji">${item.emoji}</span>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-price">${price.toLocaleString()} тг</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" data-id="${item.id}" data-delta="-1">−</button>
        <span class="qty-num">${q}</span>
        <button class="qty-btn" data-id="${item.id}" data-delta="1">+</button>
      </div>`;
    list.appendChild(card);
  });

  const ordered = MENU.filter(i => (qty[i.id] || 0) > 0);
  const total   = ordered.reduce((s, i) => s + (qty[i.id] || 0) * getItemPrice(i), 0);
  const hasItems = ordered.length > 0;

  document.getElementById("summary").style.display    = hasItems ? "block" : "none";
  document.getElementById("empty-hint").style.display = hasItems ? "none"  : "block";

  if (hasItems) {
    document.getElementById("summary-lines").innerHTML =
      ordered.map(i =>
        `<div class="summary-row">
           <span>${i.name} × ${qty[i.id]}</span>
           <span>${((qty[i.id] || 0) * getItemPrice(i)).toLocaleString()} тг</span>
         </div>`
      ).join("");
    document.getElementById("total-val").textContent = total.toLocaleString() + " тг";
  }

  if (isTg) {
    hasItems ? tg.MainButton.show() : tg.MainButton.hide();
  } else {
    document.getElementById("order-btn-fallback").disabled = !hasItems;
  }
}

function sendOrder() {
  const shop    = document.getElementById("shop-select").value;
  const ordered = MENU.filter(i => (qty[i.id] || 0) > 0);
  const total   = ordered.reduce((s, i) => s + (qty[i.id] || 0) * getItemPrice(i), 0);

  const payload = {
    shop,
    items: ordered.map(i => ({
      name:  i.name,
      qty:   qty[i.id],
      price: getItemPrice(i),
      total: (qty[i.id] || 0) * getItemPrice(i),
    })),
    total,
  };

  if (isTg) {
    tg.MainButton.showProgress();         // крутилка пока бот обрабатывает
    tg.sendData(JSON.stringify(payload)); // отправляет данные в бот и закрывает WebApp
  } else {
    // Браузерный fallback
    console.log("Payload:", JSON.stringify(payload, null, 2));
    document.getElementById("main").style.display    = "none";
    document.getElementById("success").style.display = "block";
    document.getElementById("success-sub").textContent =
      `${shop} · ${ordered.length} поз. · ${total.toLocaleString()} тг`;
  }
}

loadMenu();
</script>
</body>
</html>
